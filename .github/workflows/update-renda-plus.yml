name: Atualizar Renda+ 2064 (Tesouro Direto)

on:
  schedule:
    # Roda todos os dias às 21h BRT (00h UTC) — após fechamento do mercado
    - cron: '10 0 * * *'
    # Fallback às 09h BRT (12h UTC)
    - cron: '10 12 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Buscar dados do Tesouro Renda+ 2064
        run: python scripts/fetch_renda_plus.py

      - name: Commit e push (se houver mudança)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/renda_plus_2064.json
          git diff --cached --quiet || git commit -m "data: Renda+ 2064 $(date +%d/%m/%Y)"
          git push
